<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#0B1426;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#162236;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0B1426;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge> 
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge> 
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <radialGradient id="shieldGlow" cx="50%" cy="40%" r="60%">
            <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.3" />
            <stop offset="70%" style="stop-color:#00D4AA;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0" />
        </radialGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="456" height="456" fill="url(#backgroundGradient)" />

    <!-- Background glow -->
    <ellipse cx="228" cy="180" rx="200" ry="150" fill="url(#shieldGlow)" />

    <!-- Main shield -->
    <path d="M228 80 L318 120 L318 200 C318 250 228 320 228 340 C228 320 138 250 138 200 L138 120 Z" 
          fill="#00D4AA" 
          filter="url(#glow)" 
          opacity="0.9"/>

    <!-- Inner shield details -->
    <path d="M228 95 L303 130 L303 195 C303 235 228 295 228 310 C228 295 153 235 153 195 L153 130 Z" 
          fill="none" 
          stroke="#0B1426" 
          stroke-width="3" 
          opacity="0.8"/>

    <!-- Fingerprint pattern inside shield -->
    <g transform="translate(228,180)" stroke="#0B1426" stroke-width="2" fill="none">
        <!-- Outer fingerprint rings -->
        <ellipse cx="0" cy="0" rx="35" ry="45" opacity="0.8"/>
        <ellipse cx="0" cy="0" rx="28" ry="36" opacity="0.6"/>
        <ellipse cx="0" cy="0" rx="21" ry="27" opacity="0.4"/>
        <ellipse cx="0" cy="0" rx="14" ry="18" opacity="0.2"/>

        <!-- Fingerprint detail lines -->
        <path d="M -25 -12 Q 0 -18 25 -12" opacity="0.7"/>
        <path d="M -20 0 Q 0 -4 20 0" opacity="0.7"/>
        <path d="M -15 12 Q 0 8 15 12" opacity="0.7"/>
        <path d="M -10 24 Q 0 20 10 24" opacity="0.7"/>

        <!-- Additional detail -->
        <path d="M -30 -20 Q -12 -28 4 -20" opacity="0.4"/>
        <path d="M -30 28 Q -12 36 4 28" opacity="0.4"/>
    </g>

    <!-- Central security dot -->
    <circle cx="228" cy="180" r="3" fill="#0B1426"/>

    <!-- App title -->
    <g transform="translate(228,280)" fill="#00D4AA" text-anchor="middle" filter="url(#textGlow)">
        <text font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="bold" opacity="0.95">
            <tspan x="0" y="0">BYTESHIELD</tspan>
        </text>
    </g>

    <!-- Subtitle -->
    <g transform="translate(228,320)" fill="#B0BEC5" text-anchor="middle">
        <text font-family="Arial, sans-serif" font-size="14" font-weight="normal" opacity="0.8">
            <tspan x="0" y="0">PERSONAL VAULT</tspan>
        </text>
    </g>

    <!-- Loading indicator dots -->
    <g transform="translate(228,380)" fill="#00D4AA" opacity="0.6">
        <circle cx="-20" cy="0" r="3">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0s"/>
        </circle>
        <circle cx="0" cy="0" r="3">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
        <circle cx="20" cy="0" r="3">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
        </circle>
    </g>

    <!-- Subtle security grid pattern -->
    <g stroke="#00D4AA" stroke-width="0.5" opacity="0.1" fill="none">
        <line x1="0" y1="114" x2="456" y2="114"/>
        <line x1="0" y1="228" x2="456" y2="228"/>
        <line x1="0" y1="342" x2="456" y2="342"/>
        <line x1="114" y1="0" x2="114" y2="456"/>
        <line x1="228" y1="0" x2="228" y2="456"/>
        <line x1="342" y1="0" x2="342" y2="456"/>
    </g>
</svg>