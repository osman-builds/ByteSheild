<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0B1426;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#162236;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0B1426;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge> 
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge> 
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background circle -->
    <circle cx="228" cy="228" r="228" fill="url(#shieldGradient)" />

    <!-- Shield shape -->
    <path d="M228 60 L338 110 L338 220 C338 280 228 360 228 380 C228 360 118 280 118 220 L118 110 Z" 
          fill="url(#shieldGradient)" 
          stroke="#00D4AA" 
          stroke-width="6"
          filter="url(#glow)"/>

    <!-- Inner shield highlight -->
    <path d="M228 80 L318 120 L318 210 C318 260 228 330 228 345 C228 330 138 260 138 210 L138 120 Z" 
          fill="none" 
          stroke="#00D4AA" 
          stroke-width="2"
          opacity="0.6"/>

    <!-- ByteShield fingerprint pattern -->
    <g transform="translate(228,200)" stroke="#00D4AA" stroke-width="3" fill="none" filter="url(#innerGlow)">
        <!-- Outer fingerprint rings -->
        <ellipse cx="0" cy="0" rx="45" ry="60" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="36" ry="48" opacity="0.7"/>
        <ellipse cx="0" cy="0" rx="27" ry="36" opacity="0.5"/>
        <ellipse cx="0" cy="0" rx="18" ry="24" opacity="0.3"/>

        <!-- Central fingerprint lines -->
        <path d="M -30 -15 Q 0 -24 30 -15" opacity="0.8"/>
        <path d="M -24 0 Q 0 -6 24 0" opacity="0.8"/>
        <path d="M -18 15 Q 0 9 18 15" opacity="0.8"/>
        <path d="M -12 30 Q 0 24 12 30" opacity="0.8"/>

        <!-- Additional security detail lines -->
        <path d="M -35 -25 Q -15 -35 5 -25" opacity="0.4"/>
        <path d="M -35 35 Q -15 45 5 35" opacity="0.4"/>
        <path d="M 25 -25 Q 35 -15 25 -5" opacity="0.4"/>
        <path d="M 25 25 Q 35 35 25 45" opacity="0.4"/>
    </g>

    <!-- Central dot -->
    <circle cx="228" cy="200" r="4" fill="#00D4AA" filter="url(#innerGlow)"/>

    <!-- Subtle "B" initial -->
    <g transform="translate(228,280)" fill="#00D4AA" opacity="0.6">
        <path d="M -8 -15 L -8 15 L 2 15 C 6 15 8 13 8 9 C 8 6 6 4 4 4 C 6 4 8 2 8 -1 C 8 -5 6 -7 2 -7 L -8 -7 Z M -3 -2 L 1 -2 C 3 -2 3 -1 3 0 C 3 1 3 2 1 2 L -3 2 Z M -3 7 L 2 7 C 4 7 4 8 4 9 C 4 10 4 11 2 11 L -3 11 Z"/>
    </g>
</svg>