<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge> 
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Shield shape -->
    <path d="M228 60 L338 110 L338 220 C338 280 228 360 228 380 C228 360 118 280 118 220 L118 110 Z" 
          fill="#00D4AA" 
          filter="url(#glow)"/>

    <!-- ByteShield fingerprint pattern -->
    <g transform="translate(228,200)" stroke="#0B1426" stroke-width="2" fill="none">
        <!-- Outer fingerprint rings -->
        <ellipse cx="0" cy="0" rx="45" ry="60" opacity="0.8"/>
        <ellipse cx="0" cy="0" rx="36" ry="48" opacity="0.6"/>
        <ellipse cx="0" cy="0" rx="27" ry="36" opacity="0.4"/>
        <ellipse cx="0" cy="0" rx="18" ry="24" opacity="0.2"/>

        <!-- Central fingerprint lines -->
        <path d="M -30 -15 Q 0 -24 30 -15" opacity="0.7"/>
        <path d="M -24 0 Q 0 -6 24 0" opacity="0.7"/>
        <path d="M -18 15 Q 0 9 18 15" opacity="0.7"/>
        <path d="M -12 30 Q 0 24 12 30" opacity="0.7"/>
    </g>

    <!-- Central dot -->
    <circle cx="228" cy="200" r="3" fill="#0B1426"/>

    <!-- ByteShield text -->
    <g transform="translate(228,330)" fill="#0B1426" text-anchor="middle">
        <text font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="bold">
            <tspan x="0" y="0">BYTE</tspan>
            <tspan x="0" y="28">SHIELD</tspan>
        </text>
    </g>
</svg>