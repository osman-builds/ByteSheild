<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1426;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#162236;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1426;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGlow)" />

  <!-- Shield background with gradient -->
  <path d="M50 5 L75 20 L75 50 C75 70 50 90 50 95 C50 90 25 70 25 50 L25 20 Z" 
        fill="url(#shieldGradient)" 
        stroke="#00D4AA" 
        stroke-width="2"
        filter="url(#glow)"/>

  <!-- Inner shield highlight -->
  <path d="M50 12 L68 22 L68 45 C68 60 50 78 50 82 C50 78 32 60 32 45 L32 22 Z" 
        fill="none" 
        stroke="#00D4AA" 
        stroke-width="1" 
        opacity="0.6"/>

  <!-- ByteShield fingerprint pattern -->
  <g transform="translate(50,50)" stroke="#00D4AA" stroke-width="1.5" fill="none" filter="url(#innerGlow)">
    <!-- Outer fingerprint rings -->
    <ellipse cx="0" cy="0" rx="15" ry="20" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="12" ry="16" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="9" ry="12" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="6" ry="8" opacity="0.3"/>

    <!-- Fingerprint lines -->
    <path d="M -10 -5 Q 0 -8 10 -5" opacity="0.8"/>
    <path d="M -8 0 Q 0 -2 8 0" opacity="0.8"/>
    <path d="M -6 5 Q 0 3 6 5" opacity="0.8"/>
    <path d="M -4 10 Q 0 8 4 10" opacity="0.8"/>

    <!-- Additional security detail lines -->
    <path d="M -12 -8 Q -6 -12 0 -8" opacity="0.4"/>
    <path d="M -12 12 Q -6 16 0 12" opacity="0.4"/>
    <path d="M 8 -8 Q 12 -6 8 -2" opacity="0.4"/>
    <path d="M 8 12 Q 12 14 8 18" opacity="0.4"/>
  </g>

  <!-- Central security dot -->
  <circle cx="50" cy="50" r="2" fill="#00D4AA" filter="url(#innerGlow)"/>

  <!-- Subtle "BS" monogram -->
  <g transform="translate(50,70)" fill="#00D4AA" opacity="0.4" text-anchor="middle">
    <text font-family="Arial, sans-serif" font-size="8" font-weight="bold">BS</text>
  </g>
</svg>